version: "2"
sql:
  - engine: "postgresql"
    queries: "db/queries"
    schema: "internal/migrations"
    gen:
      go:
        package: "store"
        out: "internal/store"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_prepared_queries: false
        emit_interface: true
        emit_empty_slices: true
        rename:
          ingest_ip: "IngestIP"
          http_method: "HTTPMethod"
          http_path: "HTTPPath"
