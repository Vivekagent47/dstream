version: "2"
sql:
  - engine: "postgresql"
    queries: "db/queries"
    schema: "db/migrations"
    gen:
      go:
        package: "store"
        out: "internal/store"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_prepared_queries: false
        emit_interface: true
        emit_empty_slices: true
        rename:
          ingest_ip: "IngestIP"
          http_method: "HTTPMethod"
          http_path: "HTTPPath"
        overrides:
          - column: "users.email"
            go_type: "string"
          - column: "magic_link_tokens.email"
            go_type: "string"
          - column: "org_invites.email"
            go_type: "string"
