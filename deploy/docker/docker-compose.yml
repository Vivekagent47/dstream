name: dstream-dev

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dstream
      POSTGRES_PASSWORD: dstream
      POSTGRES_DB: dstream
    ports:
      # Host 5432 is taken by a local Postgres; expose the container on 5433.
      # In-network services still reach it as postgres:5432.
      - "5433:5432"
    volumes:
      # PG18 images store data in a version subdir; mount the parent, not /data.
      - ../../.data/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dstream -d dstream"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - ../../.data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- application ---
  # All three build the same image from the repo-root Dockerfile and load
  # config from the repo-root .env, then override the host-style addresses
  # (localhost) with the in-network service names. `environment` wins over
  # `env_file`, so only the networking vars need restating here.

  # One-shot: apply pending migrations, then exit. server/worker gate on it
  # completing successfully so they never start against an unmigrated DB.
  migrate:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile
    command: ["migrate", "up"]
    env_file: ../../.env
    environment:
      DSTREAM_DB_URL: postgres://dstream:dstream@postgres:5432/dstream?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  server:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile
    command: ["server"]
    env_file: ../../.env
    environment:
      DSTREAM_DB_URL: postgres://dstream:dstream@postgres:5432/dstream?sslmode=disable
      DSTREAM_REDIS_ADDR: redis:6379
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile
    command: ["worker"]
    env_file: ../../.env
    environment:
      DSTREAM_DB_URL: postgres://dstream:dstream@postgres:5432/dstream?sslmode=disable
      DSTREAM_REDIS_ADDR: redis:6379
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    restart: unless-stopped

  # Frontend dev server. Runs Vite in the repo's web/ (bind-mounted for hot
  # reload); the anonymous node_modules volume keeps the container's Linux
  # deps from being shadowed by the host's macOS node_modules. Proxies
  # /api,/e,/admin to the server container. ponytail: dev server in Docker so
  # `up` is one command; for a prod image you'd build static assets instead.
  # web:
  #   build:
  #     context: ../../web
  #     dockerfile: ../deploy/docker/web.Dockerfile
  #   environment:
  #     DSTREAM_API_URL: http://server:8080
  #   ports:
  #     - "3000:3000"
  #   volumes:
  #     - ../../web:/app
  #     - /app/node_modules # keep the image's Linux node_modules, not the host's
  #   depends_on:
  #     - server
